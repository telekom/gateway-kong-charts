{{/*
Optional Secret for Argo Rollouts Prometheus analysis authentication.
Created only when credentials are provided directly via values
(e.g. injected by argocd-conjur-plugin-helm).
The secret contains a "basic-auth" key with base64-encoded "username:password".
Skipped if the KEDA credentials template already creates a secret with the same name.
*/}}
{{- if and .Values.argoRollouts.enabled .Values.argoRollouts.analysisTemplates.enabled }}
{{- if .Values.argoRollouts.analysisTemplates.credentials }}
{{- if .Values.argoRollouts.analysisTemplates.credentials.create }}
{{- $rolloutsSecretName := .Values.argoRollouts.analysisTemplates.credentials.secretName | default (printf "%s-rollouts-prometheus-creds" .Release.Name) }}
{{- $kedaCreates := false }}
{{- if and .Values.kedaAutoscaling.enabled .Values.kedaAutoscaling.triggers.prometheus.enabled }}
{{- if and .Values.kedaAutoscaling.triggers.prometheus.credentials .Values.kedaAutoscaling.triggers.prometheus.credentials.create }}
{{- $kedaSecretName := .Values.kedaAutoscaling.triggers.prometheus.credentials.secretName | default (printf "%s-keda-prometheus-creds" .Release.Name) }}
{{- if eq $kedaSecretName $rolloutsSecretName }}
{{- $kedaCreates = true }}
{{- end }}
{{- end }}
{{- end }}
{{- if not $kedaCreates }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $rolloutsSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app.labels.standard" $ | nindent 4 }}
    app.kubernetes.io/component: argo-rollouts
type: Opaque
stringData:
  username: {{ .Values.argoRollouts.analysisTemplates.credentials.username | quote }}
  password: {{ .Values.argoRollouts.analysisTemplates.credentials.password | quote }}
  basic-auth: {{ printf "%s:%s" .Values.argoRollouts.analysisTemplates.credentials.username .Values.argoRollouts.analysisTemplates.credentials.password | b64enc | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
