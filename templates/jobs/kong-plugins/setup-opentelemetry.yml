{{- if and (.Values.adminApi.enabled) (eq (include "kong.isOpentelemetryEnabled" $) "true") }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-opentelemetry-setup
  labels: {{ include "app.labels.standard" $ | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: {{ .Values.setupJobs.ttlSecondsAfterFinished }}
  backoffLimit: {{ .Values.setupJobs.backoffLimit | default 15 }}
  activeDeadlineSeconds: {{ .Values.setupJobs.activeDeadlineSeconds | default 3600 }}
  template:
    spec:
      {{- include "image_pull_secrets" $ | indent 6 }}
      securityContext: {{ .Values.podSecurityContext | toYaml | nindent 8 }}
      containers:
      - name: opentelemetry-setup
        image: {{ include "images.job" $ }}
        securityContext: {{ .Values.jobs.containerSecurityContext | toYaml | nindent 10 }}
        resources: {{ .Values.setupJobs.resources | toYaml | nindent 10 }}
        env:
        - name: X_TARDIS_GATEWAY_ADMIN
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}
              key: gatewayAdminApiKey
        command:
          - /bin/bash
          - -c
          - |-
            echo "Enabling Kong ENI flavoured OpenTelemetry plugin via PUT {{ include "kong.adminApi.serviceUrl" . }}/plugins"

            ADMIN_API_HTTP_RETURN_CODE=`curl -Is -o /dev/null -w "%{http_code}" -u "admin:$X_TARDIS_GATEWAY_ADMIN" -X GET {{ include "kong.adminApi.serviceUrl" . }}`
            if [ "$ADMIN_API_HTTP_RETURN_CODE" != "200" ]; then
                echo "Kong Admin-API unreachable return: $ADMIN_API_HTTP_RETURN_CODE"
                exit 1
            fi

            CONFIG_CALL_HTTP_RETURN_CODE=`curl \
            -o /dev/null \
            -w "%{http_code}" \
            -u "admin:$X_TARDIS_GATEWAY_ADMIN" \
            -X PUT {{ include "kong.adminApi.serviceUrl" . }}/plugins/{{ .Values.plugins.opentelemetry.pluginId }} \
            --header 'Content-Type: application/json' \
            --data \
            '{
              "name" : "opentelemetry",
              "tags" : ["tardis","otel","eni-opentelemetry"],
              "config" : {
                "traces_endpoint" : "{{ .Values.plugins.opentelemetry.collectorUrl | default .Values.global.tracing.collectorUrl }}",
                "sampling_rate" : {{ .Values.plugins.opentelemetry.sampleRatio | default .Values.global.tracing.sampleRatio }},
                "resource_attributes" : {
                  "service.name" : "{{ .Values.plugins.opentelemetry.defaultServiceName | default .Values.global.tracing.defaultServiceName }}"
                },
                "local_service_name" : "{{ .Values.plugins.opentelemetry.defaultServiceName | default .Values.global.tracing.defaultServiceName }}",
                "zone" : "{{ .Values.plugins.opentelemetry.zone | default .Values.global.zone | default "unknown" }}",
                "header_type" : "{{ .Values.plugins.opentelemetry.headerType | default "b3" }}"
              }
            }'`

            if [ "$CONFIG_CALL_HTTP_RETURN_CODE" != "200" ] && [ "$CONFIG_CALL_HTTP_RETURN_CODE" != "201" ]; then
              echo "Configuring plugin failed"
              exit 1
            fi

            # Ensure the Zipkin plugin is not active at the same time
            # (exactly one trace exporter must run). Ignore 404 (already absent).
            echo "Removing Zipkin plugin (if present) via DELETE"
            ZIPKIN_DELETE_HTTP_RETURN_CODE=`curl \
            -o /dev/null \
            -w "%{http_code}" \
            -u "admin:$X_TARDIS_GATEWAY_ADMIN" \
            -X DELETE {{ include "kong.adminApi.serviceUrl" . }}/plugins/{{ .Values.plugins.zipkin.pluginId }}`
            if [ "$ZIPKIN_DELETE_HTTP_RETURN_CODE" != "204" ] && [ "$ZIPKIN_DELETE_HTTP_RETURN_CODE" != "404" ]; then
              echo "Zipkin plugin removal failed: $ZIPKIN_DELETE_HTTP_RETURN_CODE"
              exit 1
            fi

      restartPolicy: OnFailure
{{- end }}
